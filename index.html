<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
/* ============================================================
   DIRECT PDF DOWNLOAD — NO PRINT POPUP
   Paste this at the very bottom before </body>
   ============================================================ */

function downloadReport() {
  if (!window.jspdf || !window.jspdf.jsPDF) {
    alert("PDF library is still loading. Please click Download again in 2 seconds.");
    return;
  }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF("p", "mm", "a4");

  /* Pull personalised data from your existing quiz logic */
  const r = calc();
  const arch = ARCH[r.primary] || ARCH.blueprint;
  const bpd = BP_DEEP[state.bp] || BP_DEEP.worker;
  const wins = QUICK_WINS[r.primary] || QUICK_WINS.blueprint;

  const name = ((state.firstName || "") + " " + (state.lastName || "")).trim() || "Participant";
  const totalChecks = (state.pricing || 0) + (state.time_leaks || 0) + (state.systems || 0);

  const sizeLabel = {
    solo: "solopreneur",
    employee: "employee",
    "2-5": "2 to 5 person business",
    "6-10": "6 to 10 person business",
    "11-25": "11 to 25 person business",
    "26-50": "26 to 50 person business",
    "51-100": "51 to 100 person business",
    "100+": "100 person plus business"
  };

  const report = {
    name: name,
    total: fmtFull(r.total),
    pricing: fmtFull(r.p),
    time: fmtFull(r.t),
    systems: fmtFull(r.s),
    blueprint: fmtFull(r.b),
    calcNote: totalChecks + " identified leaks across your " + (sizeLabel[state.size] || "business") + ", calculated against your revenue tier",
    archName: arch.name,
    archDesc: arch.desc,
    archBridge: arch.bridge,
    bpName: bpd.name,
    bpBelief: bpd.belief,
    bpVoice: bpd.voice,
    bpBehaviours: bpd.behaviours || [],
    bpWatchout: bpd.watchout || [],
    bpUpgrade: bpd.upgrade,
    wins: wins || []
  };

  function clean(v) {
    return (v || "").toString();
  }

  function filenameSafe(v) {
    return clean(v).replace(/[^\w\s-]/g, "").replace(/\s+/g, "-") || "Participant";
  }

  function header(pageTitle) {
    doc.setDrawColor(28, 56, 41);
    doc.setLineWidth(1.1);
    doc.line(14, 23, 196, 23);

    doc.setTextColor(28, 56, 41);
    doc.setFont("helvetica", "bold");
    doc.setFontSize(15);
    doc.text("MONEY LEAK AUDIT REPORT", 14, 14);

    doc.setTextColor(100, 100, 100);
    doc.setFont("helvetica", "normal");
    doc.setFontSize(8.5);
    doc.text("Personalised for " + report.name + " · Millionaire Mind Intensive · T. Harv Eker", 14, 20);

    if (pageTitle) {
      doc.setTextColor(28, 56, 41);
      doc.setFont("helvetica", "bold");
      doc.setFontSize(16);
      doc.text(pageTitle, 14, 38);
    }
  }

  function footer(pageNum) {
    doc.setDrawColor(220, 220, 220);
    doc.setLineWidth(0.3);
    doc.line(14, 282, 196, 282);

    doc.setTextColor(130, 130, 130);
    doc.setFont("helvetica", "normal");
    doc.setFontSize(7.5);
    doc.text("© 2026 Success Resources | Millionaire Mind Intensive", 14, 288);

    doc.setTextColor(28, 56, 41);
    doc.setFont("helvetica", "bold");
    doc.text("Page " + pageNum + " of 4", 178, 288);
  }

  function wrapped(text, x, y, width, lineHeight) {
    const lines = doc.splitTextToSize(clean(text), width);
    doc.text(lines, x, y);
    return y + lines.length * lineHeight;
  }

  function sectionTitle(title, y) {
    doc.setTextColor(28, 56, 41);
    doc.setFont("helvetica", "bold");
    doc.setFontSize(14);
    doc.text(title, 14, y);
    return y + 8;
  }

  function card(x, y, w, h, borderColor) {
    const c = borderColor || [210, 210, 210];
    doc.setDrawColor(c[0], c[1], c[2]);
    doc.setLineWidth(0.6);
    doc.roundedRect(x, y, w, h, 3, 3);
  }

  /* ============================================================
     PAGE 1
     ============================================================ */
  header("");

  doc.setFillColor(28, 56, 41);
  doc.roundedRect(14, 36, 182, 48, 4, 4, "F");

  doc.setTextColor(221, 184, 78);
  doc.setFont("helvetica", "bold");
  doc.setFontSize(9);
  doc.text("YOUR ESTIMATED ANNUAL MONEY LEAK", 105, 48, { align: "center" });

  doc.setFontSize(30);
  doc.text(report.total, 105, 64, { align: "center" });

  doc.setTextColor(235, 235, 235);
  doc.setFont("helvetica", "normal");
  doc.setFontSize(10);
  doc.text("per year slipping through the cracks", 105, 74, { align: "center" });

  doc.setFontSize(7.5);
  doc.text(report.calcNote, 105, 80, { align: "center" });

  let y = 102;
  y = sectionTitle("Your Primary Leak Type", y);

  card(14, y, 182, 45, [201, 168, 76]);

  doc.setTextColor(201, 168, 76);
  doc.setFont("helvetica", "bold");
  doc.setFontSize(8);
  doc.text("IDENTIFIED FROM YOUR ANSWERS", 21, y + 11);

  doc.setTextColor(28, 56, 41);
  doc.setFontSize(15);
  doc.text(report.archName, 21, y + 22);

  doc.setTextColor(45, 45, 45);
  doc.setFont("helvetica", "normal");
  doc.setFontSize(9.5);
  wrapped(report.archDesc, 21, y + 31, 168, 4.7);

  y += 62;
  y = sectionTitle("Where Your Money Is Leaking", y);

  card(14, y, 182, 58, [210, 210, 210]);

  const leakRows = [
    ["Pricing Leaks", report.pricing],
    ["Time Leaks", report.time],
    ["Systems Leaks", report.systems],
    ["Blueprint Tax", report.blueprint]
  ];

  let rowY = y + 14;
  leakRows.forEach(function(row, i) {
    doc.setTextColor(35, 35, 35);
    doc.setFont("helvetica", "normal");
    doc.setFontSize(10);
    doc.text(row[0], 22, rowY);

    doc.setTextColor(220, 38, 38);
    doc.setFont("helvetica", "bold");
    doc.text(row[1], 186, rowY, { align: "right" });

    doc.setDrawColor(235, 235, 235);
    doc.line(22, rowY + 4, 186, rowY + 4);

    rowY += 11;
  });

  footer(1);

  /* ============================================================
     PAGE 2
     ============================================================ */
  doc.addPage();
  header("Your Money Blueprint Pattern");

  y = 52;

  doc.setFillColor(28, 56, 41);
  doc.roundedRect(14, y, 182, 40, 4, 4, "F");

  doc.setTextColor(210, 210, 210);
  doc.setFont("helvetica", "bold");
  doc.setFontSize(8);
  doc.text("YOUR MONEY BLUEPRINT · CORE BELIEF", 22, y + 12);

  doc.setTextColor(255, 255, 255);
  doc.setFont("helvetica", "italic");
  doc.setFontSize(13);
  wrapped('"' + report.bpBelief.replace(/^"|"$/g, "") + '"', 22, y + 25, 165, 6);

  y += 52;

  y = sectionTitle("The Little Voice In Your Head", y);
  card(14, y, 182, 32, [210, 210, 210]);

  doc.setTextColor(45, 45, 45);
  doc.setFont("helvetica", "italic");
  doc.setFontSize(10);
  wrapped(report.bpVoice, 22, y + 12, 165, 5);

  y += 48;

  y = sectionTitle("How It Shows Up In Your Business", y);

  card(14, y, 182, 54, [210, 210, 210]);

  let behaviourY = y + 11;
  doc.setFont("helvetica", "normal");
  doc.setFontSize(9.2);
  doc.setTextColor(45, 45, 45);

  report.bpBehaviours.slice(0, 5).forEach(function(item) {
    doc.setTextColor(201, 168, 76);
    doc.setFont("helvetica", "bold");
    doc.text("→", 22, behaviourY);

    doc.setTextColor(45, 45, 45);
    doc.setFont("helvetica", "normal");
    behaviourY = wrapped(item, 29, behaviourY, 155, 4.5);
    behaviourY += 1.2;
  });

  y += 68;

  y = sectionTitle("The Upgrade", y);

  card(14, y, 182, 44, [187, 247, 208]);

  doc.setTextColor(21, 128, 61);
  doc.setFont("helvetica", "normal");
  doc.setFontSize(9.5);
  wrapped(report.bpUpgrade, 22, y + 12, 165, 5);

  footer(2);

  /* ============================================================
     PAGE 3
     ============================================================ */
  doc.addPage();
  header("3 Things You Can Do This Week");

  y = 52;

  doc.setTextColor(100, 100, 100);
  doc.setFont("helvetica", "normal");
  doc.setFontSize(9.5);
  doc.text("Specific to your primary leak. No event needed to start here.", 14, y);

  y += 12;

  report.wins.slice(0, 3).forEach(function(win, index) {
    card(14, y, 182, 48, [210, 210, 210]);

    doc.setFillColor(28, 56, 41);
    doc.circle(25, y + 14, 5, "F");

    doc.setTextColor(201, 168, 76);
    doc.setFont("helvetica", "bold");
    doc.setFontSize(10);
    doc.text(String(index + 1), 25, y + 17, { align: "center" });

    doc.setTextColor(201, 168, 76);
    doc.setFont("helvetica", "bold");
    doc.setFontSize(8);
    doc.text(clean(win.label).toUpperCase(), 36, y + 12);

    doc.setTextColor(45, 45, 45);
    doc.setFont("helvetica", "normal");
    doc.setFontSize(8.8);
    let innerY = wrapped(win.text, 36, y + 21, 150, 4.2);

    doc.setTextColor(22, 163, 74);
    doc.setFont("helvetica", "bolditalic");
    doc.setFontSize(8.2);
    wrapped("→ " + win.action, 36, innerY + 2, 150, 4);

    y += 56;
  });

  y += 4;
  y = sectionTitle("The Complete Solution", y);

  card(14, y, 182, 55, [221, 213, 200]);

  doc.setTextColor(28, 56, 41);
  doc.setFont("helvetica", "bold");
  doc.setFontSize(12);
  doc.text("These quick wins are the start. Not the seal.", 22, y + 12);

  doc.setTextColor(45, 45, 45);
  doc.setFont("helvetica", "normal");
  doc.setFontSize(9.2);
  wrapped(report.archBridge, 22, y + 23, 165, 4.6);

  footer(3);

  /* ============================================================
     PAGE 4
     ============================================================ */
  doc.addPage();
  header("What Changes in 3 Days");

  y = 52;

  doc.setTextColor(120, 120, 120);
  doc.setFont("helvetica", "bold");
  doc.setFontSize(8.5);
  doc.text("MILLIONAIRE MIND HYBRID PROGRAMME OUTCOMES", 14, y);

  y += 13;

  const outcomes = [
    "Day 1: Complete money management system, 6 accounts set up and running, including your Financial Freedom Account.",
    "Day 2: Blueprint pattern identified at the root, where it formed, what it costs, and what it sounds like in real time.",
    "Day 3: Pattern released through a proven conditioning process used with 1.5 million graduates worldwide.",
    "Personalised passive income plan and your specific Financial Freedom number.",
    "Pricing and leverage frameworks specific to your business size and industry."
  ];

  outcomes.forEach(function(item) {
    doc.setTextColor(22, 163, 74);
    doc.setFont("helvetica", "bold");
    doc.setFontSize(11);
    doc.text("✓", 16, y);

    doc.setTextColor(45, 45, 45);
    doc.setFont("helvetica", "normal");
    doc.setFontSize(9.5);
    y = wrapped(item, 25, y, 165, 5);
    y += 6;
  });

  y += 10;

  doc.setFillColor(245, 240, 233);
  doc.setDrawColor(221, 213, 200);
  doc.roundedRect(14, y, 182, 58, 4, 4, "FD");

  doc.setTextColor(28, 56, 41);
  doc.setFont("helvetica", "bold");
  doc.setFontSize(13);
  doc.text("Ready to seal these leaks permanently?", 22, y + 14);

  doc.setTextColor(45, 45, 45);
  doc.setFont("helvetica", "normal");
  doc.setFontSize(9.5);
  wrapped(
    "You have seen the number. You know the blueprint. You have your first three steps. The question now is how fast you want to seal it, and whether you want to do it alone or with 23 years of proven methodology behind you.",
    22,
    y + 25,
    165,
    4.8
  );

  doc.setTextColor(28, 56, 41);
  doc.setFont("helvetica", "bold");
  doc.setFontSize(9.5);
  doc.text("Visit millionairemindworld.com · Claim your spot at Millionaire Mind Hybrid", 22, y + 51);

  doc.setTextColor(28, 56, 41);
  doc.setFont("helvetica", "bold");
  doc.setFontSize(13);
  doc.text("Millionaire Mind Intensive", 105, 240, { align: "center" });

  doc.setTextColor(130, 130, 130);
  doc.setFont("helvetica", "normal");
  doc.setFontSize(8.5);
  doc.text("T. Harv Eker · Success Resources · millionairemindworld.com", 105, 248, { align: "center" });

  doc.setTextColor(170, 170, 170);
  doc.setFontSize(8);
  doc.text("10 million attendees · 30 countries · 23 years", 105, 255, { align: "center" });

  footer(4);

  doc.save("Money-Leak-Audit-" + filenameSafe(report.name) + ".pdf");
}
</script>
